name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install yamllint ruff
      - run: yamllint . --ignore-path .gitignore
      - run: ruff check . || true

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config > /dev/null

  promtool:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker run --rm -v "$PWD/configs/prometheus:/etc/prom" \
            prom/prometheus:latest promtool check rules /etc/prom/alerts.yml
          docker run --rm -v "$PWD/configs/prometheus:/etc/prom" \
            prom/prometheus:latest promtool check config /etc/prom/prometheus.yml
