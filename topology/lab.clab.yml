name: observability

topology:
  nodes:
    spine1:
      kind: linux
      image: frrouting/frr:9.1.0
      binds:
        - ./configs/frr/spine1.conf:/etc/frr/frr.conf
        - ./configs/frr/daemons:/etc/frr/daemons

    leaf1:
      kind: linux
      image: frrouting/frr:9.1.0
      binds:
        - ./configs/frr/leaf1.conf:/etc/frr/frr.conf
        - ./configs/frr/daemons:/etc/frr/daemons

    leaf2:
      kind: linux
      image: frrouting/frr:9.1.0
      binds:
        - ./configs/frr/leaf2.conf:/etc/frr/frr.conf
        - ./configs/frr/daemons:/etc/frr/daemons

  links:
    - endpoints: ["spine1:eth1", "leaf1:eth1"]
    - endpoints: ["spine1:eth2", "leaf2:eth1"]
    - endpoints: ["leaf1:eth2", "leaf2:eth2"]
