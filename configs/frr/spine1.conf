!
! FRRouting configuration for spine1
! BGP with BMP monitoring and syslog enabled
!
hostname spine1
no ip forwarding
!
router bgp 65000
 bgp router-id 10.0.0.1
 bgp log-neighbor-changes
 neighbor leaf1 remote-as 65001
 neighbor leaf1 update-source 10.0.1.1
 neighbor leaf2 remote-as 65002
 neighbor leaf2 update-source 10.0.1.3
 !
 address-family ipv4 unicast
  neighbor leaf1 activate
  neighbor leaf2 activate
 exit-address-family
!
! BMP monitoring for OpenBMP collector
bmp targets
 target openbmp
  host openbmp port 11019
  description "OpenBMP Collector"
!
! Syslog configuration (BGP neighbor state changes)
log syslog informational
log facility local0
!
interface eth1
 ip address 10.0.1.1/30
!
interface eth2
 ip address 10.0.1.3/30
!
