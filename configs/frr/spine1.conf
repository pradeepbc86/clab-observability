!
! FRRouting configuration for spine1
! BGP with BMP monitoring and syslog enabled
!
hostname spine1
no ip forwarding
!
interface lo
 ip address 10.0.0.1/32
!
interface eth1
 ip address 10.0.1.1/30
!
interface eth2
 ip address 10.0.1.5/30
!
router bgp 65000
 bgp router-id 10.0.0.1
 bgp log-neighbor-changes
 neighbor 10.0.1.2 remote-as 65001
 neighbor 10.0.1.2 description leaf1
 neighbor 10.0.1.6 remote-as 65002
 neighbor 10.0.1.6 description leaf2
 !
 address-family ipv4 unicast
  neighbor 10.0.1.2 activate
  neighbor 10.0.1.6 activate
 exit-address-family
!
! BMP monitoring — connects to OpenBMP collector
! Note: requires docker-compose and clab on shared network (see README)
bmp targets openbmp
 address 172.17.0.1 port 11019
 description "OpenBMP Collector"
!
log syslog informational
log facility local0
!
