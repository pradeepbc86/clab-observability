input {
  udp {
    port => 514
    type => "syslog"
  }
}

filter {
  if [type] == "syslog" {
    grok {
      match => { "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_hostname} %{DATA:syslog_program}: %{GREEDYDATA:syslog_message}" }
    }

    # Parse BGP adjacency change events
    if "ADJCHANGE" in [syslog_message] {
      grok {
        match => { "syslog_message" => "BGP-5-ADJCHANGE: neighbor %{IP:neighbor_ip} \(%{DATA:neighbor_asn}\) is %{WORD:bgp_state}" }
      }
    }

    # Parse BGP prefix events
    if "Received" in [syslog_message] or "Withdrawn" in [syslog_message] {
      grok {
        match => { "syslog_message" => "%{WORD:action} %{INT:prefix_count} prefixes" }
      }
    }

    date {
      match => [ "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ]
      target => "@timestamp"
    }
  }
}

output {
  if [type] == "syslog" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "bgp-events-%{+YYYY.MM.dd}"
    }
  }
}
